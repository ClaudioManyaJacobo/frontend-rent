<div class="page">
  <div class="page-header">
    <h1>Roles</h1>
    <span class="hint">Solo lectura — seed automático en el backend</span>
  </div>

  @if (loading()) {
    <p class="muted">Cargando...</p>
  } @else {
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Creado</th>
          </tr>
        </thead>
        <tbody>
          @for (r of roles(); track r.id) {
            <tr>
              <td><code>{{ r.nombre }}</code></td>
              <td>{{ r.descripcion ?? '—' }}</td>
              <td>{{ r.fecha_creacion ? (r.fecha_creacion | date: 'dd/MM/yyyy hh:mm a') : '—' }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
