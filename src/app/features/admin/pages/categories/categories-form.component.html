<div class="page">
  <div class="page-header">
    <h1>{{ isEdit() ? 'Editar categoría' : 'Nueva categoría' }}</h1>
    <a routerLink="/categorias-vehiculos" class="btn-secondary">Volver</a>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
      <div class="form-field">
        <label>Nombre</label>
        <input formControlName="nombre" placeholder="Ej. SUV" />
      </div>
      <div class="form-field">
        <label>Descripción</label>
        <input formControlName="descripcion" />
      </div>
      <div class="form-field">
        <label>Precio diario base (S/)</label>
        <input type="number" step="0.01" formControlName="precio_diario_base" />
      </div>
      <div class="form-field">
        <label>Tarifa km extra (S/)</label>
        <input type="number" step="0.01" formControlName="tarifa_km_extra" />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="loading()">
          {{ loading() ? 'Guardando...' : 'Guardar' }}
        </button>
        <a routerLink="/categorias-vehiculos" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
