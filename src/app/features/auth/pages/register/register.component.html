<h2>Crear cuenta</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <label>
    Email
    <input type="email" formControlName="email" autocomplete="email" />
    @if (form.controls.email.touched && form.controls.email.errors?.['required']) {
      <span class="error">El email es requerido</span>
    }
  </label>
  <label>
    Contraseña
    <input type="password" formControlName="password" autocomplete="new-password" />
    @if (form.controls.password.touched && form.controls.password.errors?.['minlength']) {
      <span class="error">Mínimo 8 caracteres</span>
    }
  </label>
  <label>
    Confirmar contraseña
    <input type="password" formControlName="confirmPassword" autocomplete="new-password" />
  </label>
  <button type="submit" [disabled]="loading()">
    {{ loading() ? 'Registrando...' : 'Registrarse' }}
  </button>
</form>
<p class="footer-link">
  ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
</p>
