<h2>Iniciar sesión</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <label>
    Email
    <input type="email" formControlName="email" autocomplete="email" />
    @if (form.controls.email.touched && form.controls.email.errors?.['required']) {
      <span class="error">El email es requerido</span>
    }
    @if (form.controls.email.touched && form.controls.email.errors?.['email']) {
      <span class="error">Email inválido</span>
    }
  </label>
  <label>
    Contraseña
    <input type="password" formControlName="password" autocomplete="current-password" />
    @if (form.controls.password.touched && form.controls.password.errors?.['required']) {
      <span class="error">La contraseña es requerida</span>
    }
    @if (form.controls.password.touched && form.controls.password.errors?.['minlength']) {
      <span class="error">Mínimo 8 caracteres</span>
    }
  </label>
  <button type="submit" [disabled]="loading()">
    {{ loading() ? 'Ingresando...' : 'Ingresar' }}
  </button>
</form>
<p class="footer-link">
  ¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a>
</p>
