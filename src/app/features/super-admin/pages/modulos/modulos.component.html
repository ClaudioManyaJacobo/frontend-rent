<div class="page">
  <div class="page-header">
    <h1>Módulos del Sistema</h1>
    <a routerLink="new" class="btn btn-primary">Nuevo Módulo</a>
  </div>

  @if (loading()) {
    <p class="muted">Cargando...</p>
  } @else {
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Creado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (m of modulos(); track m.id) {
            <tr>
              <td><code>{{ m.codigo }}</code></td>
              <td>{{ m.nombre }}</td>
              <td>{{ m.descripcion ?? '—' }}</td>
              <td>{{ m.fecha_creacion ? (m.fecha_creacion | peruDateTime) : '—' }}</td>
              <td class="actions">
                <a [routerLink]="[m.id, 'edit']" class="btn btn-sm">Editar</a>
                <button type="button" class="btn btn-sm btn-danger" (click)="delete(m.id, m.nombre)">Eliminar</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
