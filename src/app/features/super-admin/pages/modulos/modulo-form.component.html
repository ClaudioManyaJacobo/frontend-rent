<div class="page">
  <div class="page-header">
    <h1><i class="fa-solid fa-cube"></i> {{ isEdit() ? 'Editar' : 'Nuevo' }} Módulo</h1>
    <a routerLink="/super-admin/modulos" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Volver</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form">
    <div class="form-group">
      <label for="codigo">Código *</label>
      <input id="codigo" formControlName="codigo" class="form-control" placeholder="Ej: users" />
      @if (form.get('codigo')?.invalid && form.get('codigo')?.touched) {
        <span class="form-error">El código es requerido</span>
      }
    </div>

    <div class="form-group">
      <label for="nombre">Nombre *</label>
      <input id="nombre" formControlName="nombre" class="form-control" placeholder="Ej: Usuarios" />
      @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
        <span class="form-error">El nombre es requerido</span>
      }
    </div>

    <div class="form-group">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" formControlName="descripcion" class="form-control" rows="3"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading()">
        @if (loading()) {
          <i class="fa-solid fa-spinner fa-spin"></i> Guardando...
        } @else {
          <i class="fa-solid fa-floppy-disk"></i> Guardar
        }
      </button>
    </div>
  </form>
</div>
