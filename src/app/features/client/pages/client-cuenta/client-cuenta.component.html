<div class="mock-page">
  <div class="page-header">
    <h1>Mi Cuenta</h1>
    <p>Gestiona tu información personal y preferencias.</p>
  </div>

  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar">
        <span>{{ initials }}</span>
      </div>
      <div class="profile-title">
        <h2>{{ userName }}</h2>
        <p>{{ auth.currentUser()?.email }}</p>
      </div>
      <span class="badge">Cliente</span>
    </div>

    <div class="profile-body">
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" [value]="userName" disabled class="mock-input">
      </div>
      <div class="form-group">
        <label>Email de registro</label>
        <input type="text" [value]="auth.currentUser()?.email" disabled class="mock-input">
      </div>
      <div class="form-group">
        <label>Licencia de Conducir</label>
        <input type="text" placeholder="Ingresa tu número de licencia..." disabled class="mock-input">
      </div>
    </div>

    <div class="profile-footer">
      <button class="btn-primary" disabled>Actualizar Datos (Próximamente)</button>
    </div>
  </div>
</div>
