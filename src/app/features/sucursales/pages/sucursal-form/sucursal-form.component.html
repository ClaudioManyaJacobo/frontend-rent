<div class="page">
  <div class="page-header">
    <h1>{{ isEdit() ? 'Editar sucursal' : 'Nueva sucursal' }}</h1>
    <a routerLink="/sucursales" class="btn-secondary">Volver</a>
  </div>

  <div class="form-card form-card-wide">
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid two">
      @if (isSuperAdmin() && !isEdit()) {
        <div class="form-field full">
          <label>Empresa</label>
          <select formControlName="empresa_id">
            <option value="">Seleccionar empresa</option>
            @for (e of empresas(); track e.id) {
              <option [value]="e.id">{{ e.nombre }}</option>
            }
          </select>
        </div>
      }

      <div class="form-field">
        <label>Nombre</label>
        <input formControlName="nombre" placeholder="Ej. Miraflores Centro" />
      </div>
      <div class="form-field">
        <label>Ciudad</label>
        <input formControlName="ciudad" placeholder="Ej. Lima" />
      </div>
      <div class="form-field full">
        <label>Dirección</label>
        <input formControlName="direccion" />
      </div>
      <div class="form-field">
        <label>Teléfono</label>
        <input formControlName="telefono" />
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" formControlName="email" />
      </div>
      <div class="form-field">
        <label>
          <input type="checkbox" formControlName="esta_activa" />
          Sucursal activa
        </label>
      </div>
      <div class="form-actions full">
        <button type="submit" class="btn-primary" [disabled]="loading()">
          {{ loading() ? 'Guardando...' : 'Guardar' }}
        </button>
        <a routerLink="/sucursales" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
