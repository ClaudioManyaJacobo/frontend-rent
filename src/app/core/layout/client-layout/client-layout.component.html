<div class="client-shell">
  <div class="nav-trigger" [class.active]="!navbarVisible()" (mouseenter)="show()"></div>
  <header class="client-header" [class.navbar-hidden]="!navbarVisible()" (mouseenter)="show()" (mouseleave)="startHiding()">
    <div class="header-inner">
      <a
        routerLink="/cliente"
        class="brand"
        aria-label="VRS - Inicio"
      >
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M4 20h24l-2.5-7H8.5L6 20z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linejoin="round"
            />
            <circle cx="9" cy="22" r="2.5" fill="currentColor" />
            <circle cx="23" cy="22" r="2.5" fill="currentColor" />
            <path
              d="M10 13h12l1.5-4H8.5L10 13z"
              fill="currentColor"
              opacity="0.35"
            />
          </svg>
        </span>
        <span class="brand-text">
          <strong>VRS</strong>
          <small>Alquiler de vehículos</small>
        </span>
      </a>

      <nav class="main-nav" aria-label="Navegación principal">
        <a
          routerLink="/cliente"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Inicio
        </a>
        <a routerLink="/cliente/empresas" routerLinkActive="active">
          <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
          Empresas
        </a>
        @if (auth.isAuthenticated()) {
          <a routerLink="/cliente/mis-alquileres" routerLinkActive="active">
            <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 1.5 1.5M15.5 7.5 14 6"/></svg>
            Alquileres
          </a>
          <a routerLink="/cliente/mi-cuenta" routerLinkActive="active">
            <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Cuenta
          </a>
        }
        <a routerLink="/cliente/ayuda" routerLinkActive="active">
          <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Ayuda
        </a>
      </nav>

      <button type="button" class="btn-pin" [class.pinned]="pinned()" (click)="togglePin()" [attr.title]="pinned() ? 'Desanclar barra' : 'Anclar barra'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v5"/>
          <path d="M7 7h10"/>
          <path d="M9 7v4l-3 5h12l-3-5V7"/>
          <circle cx="12" cy="19" r="2"/>
        </svg>
      </button>

      <div class="header-actions">
        @if (auth.isAuthenticated()) {
          <span class="user-chip" title="{{ auth.currentUser()?.email }}">
            {{ auth.currentUser()?.email }}
          </span>
          <button type="button" class="btn-logout" (click)="auth.logout()">
            Salir
          </button>
        } @else {
          <a routerLink="/auth/register" class="btn-ghost">Registrarse</a>
          <a routerLink="/auth/login" class="btn-login">Iniciar sesión</a>
        }
      </div>
    </div>
  </header>

  <main class="client-main" [class.no-nav]="!navbarVisible()">
    <router-outlet />
  </main>

  <footer class="client-footer">
    <div class="footer-inner">
      <p>© {{ year }} VRS — Vehicle Rental System</p>
      <p class="footer-tag">Reserva con confianza · Flota verificada · Soporte 24/7</p>
    </div>
  </footer>
</div>
