<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="brand-icon">
        <path d="M6.5 3c-1.051 0-2.093.04-3.125.117A1.49 1.49 0 0 0 2 4.607V10.5h7V3H6.5ZM14 17a2 2 0 1 0 0-4 2 2 0 0 0 0 4ZM15 9a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
        <path fill-rule="evenodd" d="M1.5 12.5A1.5 1.5 0 0 1 3 11h10.5a1.5 1.5 0 0 1 1.5 1.5v.5h.5a1.5 1.5 0 0 0 1.5-1.5V6.622a1.5 1.5 0 0 0-.683-1.268l-2.2-1.382A1.5 1.5 0 0 0 13.164 3H12v4.5a1.5 1.5 0 0 1-1.5 1.5H3v3.5ZM3 6.5A1.5 1.5 0 0 1 4.5 5h2A1.5 1.5 0 0 1 8 6.5v1A1.5 1.5 0 0 1 6.5 9h-2A1.5 1.5 0 0 1 3 7.5v-1Z" clip-rule="evenodd"/>
      </svg>
      <span>Praxis.pe</span>
    </div>

    <nav>
      @for (section of navSections(); track section.title) {
        <div class="nav-section">
          <span class="nav-section-title">{{ section.title }}</span>
          @for (item of section.items; track item.label) {
            <a
              [routerLink]="prefix() + item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
              class="nav-link"
            >
              <span class="nav-icon" [innerHTML]="item.icon"></span>
              <span class="nav-label">{{ item.label }}</span>
            </a>
          }
        </div>
      }
    </nav>

    <div class="sidebar-footer">
      <span class="user-email">{{ auth.currentUser()?.email }}</span>
      <button type="button" class="btn-logout" (click)="auth.logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
      </button>
    </div>
  </aside>
  <main class="content">
    <router-outlet />
  </main>
</div>
