<div class="layout">
  <aside class="sidebar">
    <a routerLink="/cliente" class="sidebar-brand" aria-label="Praxis.pe - Inicio">
      <img src="logo.png" alt="Praxis.pe" class="brand-logo-img" />
      <span class="brand-name">Praxis<span class="brand-dot">.pe</span></span>
    </a>

    <nav>
      @for (section of navSections(); track section.title) {
        <div class="nav-section">
          <span class="nav-section-title">{{ section.title }}</span>
          @for (item of section.items; track item.label) {
            <a
              [routerLink]="prefix() + item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
              class="nav-link"
            >
              <span class="nav-icon" [innerHTML]="item.icon"></span>
              <span class="nav-label">{{ item.label }}</span>
            </a>
          }
        </div>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="profile-card">
        <div class="profile-avatar">
          {{ (auth.currentUser()?.email ?? 'U')[0].toUpperCase() }}
        </div>
        <div class="profile-info">
          <span class="profile-role" [class]="auth.roleName() | lowercase">
            {{ auth.roleName() }}
          </span>
          <span class="profile-email" [title]="auth.currentUser()?.email ?? ''">
            {{ auth.currentUser()?.email }}
          </span>
        </div>
      </div>
      <button type="button" class="btn-logout" (click)="auth.logout()" title="Cerrar sesión">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>
  <main class="content">
    <router-outlet />
  </main>
</div>
