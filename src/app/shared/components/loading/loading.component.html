<!-- loading.component.html -->
@if (visible) {
<div class="ld-overlay" aria-live="polite" aria-label="Cargando">
  <div class="ld-card">
    
    <!-- Contenedor del anillo de neón y logotipo central -->
    <div class="ld-ring-wrapper">
      <!-- Resplandor de fondo -->
      <div class="ld-glow-backdrop"></div>
      
      <!-- Anillo animado premium con degradado -->
      <svg class="ld-svg-ring" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle
          class="ld-ring-track"
          cx="50" cy="50" r="44"
          stroke="rgba(255, 255, 255, 0.04)"
          stroke-width="3"
          fill="none"
        />
        <circle
          class="ld-ring-animated"
          cx="50" cy="50" r="44"
          stroke="url(#ld-gradient-rainbow)"
          stroke-width="3.5"
          fill="none"
          stroke-linecap="round"
          stroke-dasharray="276"
          stroke-dashoffset="190"
        />
        <defs>
          <linearGradient id="ld-gradient-rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="50%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#ec4899" />
          </linearGradient>
        </defs>
      </svg>
      
      <!-- Logotipo de la aplicación en el centro con animación de respiración -->
      <div class="ld-logo-container">
        <img src="logo.png" alt="Praxis.pe" class="ld-logo-img" />
      </div>
    </div>

    <!-- Mensajes de carga premium -->
    <div class="ld-text-wrapper">
      <p class="ld-text">{{ text }}</p>
      <span class="ld-subtext">Optimizando tu viaje</span>
    </div>

  </div>
</div>
}
