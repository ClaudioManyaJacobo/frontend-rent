<!-- loading.component.html -->
@if (visible) {
<div class="ld-overlay" aria-live="polite" aria-label="Cargando">
  <div class="ld-card">
    
    <!-- Círculo exterior -->
    <div class="ld-ring">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle
          class="ld-ring-track"
          cx="50" cy="50" r="42"
          stroke="rgba(20, 184, 166, 0.1)"
          stroke-width="3"
          fill="none"
        />
        <circle
          class="ld-ring-animated"
          cx="50" cy="50" r="42"
          stroke="#14b8a6"
          stroke-width="3"
          fill="none"
          stroke-linecap="round"
          stroke-dasharray="264"
          stroke-dashoffset="200"
        />
      </svg>
      
      <!-- Icono simple de vehículo -->
      <div class="ld-car-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M3 16h18M5 16l2-6h10l2 6M9 10l1-3h4l1 3"
            stroke="#14b8a6"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="8.5" cy="17" r="1.5" fill="#14b8a6" stroke="#14b8a6" stroke-width="1"/>
          <circle cx="15.5" cy="17" r="1.5" fill="#14b8a6" stroke="#14b8a6" stroke-width="1"/>
        </svg>
      </div>
    </div>

    <!-- Texto -->
    <p class="ld-text">{{ text }}</p>

  </div>
</div>
}
